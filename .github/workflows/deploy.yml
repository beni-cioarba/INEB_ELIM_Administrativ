name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: elim-admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: elim-admin

      - name: Build
        run: npx ng build --base-href /INEB_ELIM_Administrativ/
        working-directory: elim-admin

      - name: Copy index.html to 404.html
        run: cp elim-admin/dist/elim-admin/browser/index.html elim-admin/dist/elim-admin/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: elim-admin/dist/elim-admin/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
